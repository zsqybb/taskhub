<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - TaskHub</title>
<style>
:root {
  --bg: #0f1117;
  --card-bg: #1a1d2e;
  --border: #2a2d3e;
  --text: #e1e4ed;
  --text-dim: #8b8fa5;
  --primary: #6366f1;
  --primary-hover: #777bff;
  --danger: #ef4444;
  --success: #22c55e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "Segoe UI", "PingFang SC", sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  display:flex; justify-content:center; align-items:center;
}
.register-box {
  background:var(--card-bg); border:1px solid var(--border); border-radius:16px;
  padding:40px; width:420px; max-width:90vw;
}
.logo { font-size:28px; font-weight:800; text-align:center; margin-bottom:8px; letter-spacing:-1px; }
.logo span { color:var(--primary); }
.sub { text-align:center; color:var(--text-dim); margin-bottom:28px; font-size:14px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; font-weight:500; }
.form-group input {
  width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px; outline:none; font-family:inherit;
}
.form-group input:focus { border-color:var(--primary); }
.row { display:flex; gap:12px; }
.row .form-group { flex:1; }
.btn {
  width:100%; padding:12px; border:none; border-radius:8px; cursor:pointer;
  font-size:15px; font-weight:600; transition:all .15s; margin-top:8px;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); margin-top:12px; }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.error { color:var(--danger); font-size:13px; text-align:center; margin-bottom:12px; min-height:20px; }
.footer { text-align:center; margin-top:20px; font-size:13px; color:var(--text-dim); }
.footer a { color:var(--primary); text-decoration:none; }
.footer a:hover { text-decoration:underline; }
.hint { font-size:11px; color:var(--text-dim); margin-top:2px; }
</style>
</head>
<body>
<div class="register-box">
  <div class="logo">Task<span>Hub</span></div>
  <div class="sub">创建你的工作空间</div>
  <div class="error" id="error"></div>
  <form id="registerForm" onsubmit="handleRegister(event)">
    <div class="row">
      <div class="form-group">
        <label>用户名 *</label>
        <input type="text" id="username" placeholder="至少2个字符" required autofocus>
      </div>
      <div class="form-group">
        <label>显示名称</label>
        <input type="text" id="display_name" placeholder="你的中文名">
      </div>
    </div>
    <div class="form-group">
      <label>邮箱 *</label>
      <input type="email" id="email" placeholder="name@company.com" required>
    </div>
    <div class="form-group">
      <label>密码 *</label>
      <input type="password" id="password" placeholder="至少6位" required minlength="6">
      <div class="hint">密码长度不少于6位</div>
    </div>
    <div class="form-group">
      <label>确认密码 *</label>
      <input type="password" id="password2" placeholder="再次输入密码" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">注 册</button>
  </form>
  <button class="btn btn-outline" onclick="location.href='/login'">已有账号？返回登录</button>
</div>

<script>
'use strict';
async function handleRegister(e) {
  e.preventDefault();
  var err = document.getElementById('error');
  var btn = document.getElementById('submitBtn');
  err.textContent = '';

  var pw = document.getElementById('password').value;
  var pw2 = document.getElementById('password2').value;
  if (pw !== pw2) {
    err.textContent = '两次输入的密码不一致';
    return;
  }
  if (pw.length < 6) {
    err.textContent = '密码至少6位';
    return;
  }

  btn.textContent = '注册中...';
  btn.disabled = true;

  try {
    var res = await fetch('/api/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        display_name: document.getElementById('display_name').value.trim(),
        password: pw
      })
    });
    var data = await res.json();
    if (res.ok && data.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || '注册失败';
    }
  } catch(e) {
    err.textContent = '网络错误，请检查服务是否启动';
  }
  btn.textContent = '注 册';
  btn.disabled = false;
}
</script>
</body>
</html>
