<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - TaskHub</title>
<style>
:root {
  --bg: #0f1117;
  --card-bg: #1a1d2e;
  --border: #2a2d3e;
  --text: #e1e4ed;
  --text-dim: #8b8fa5;
  --primary: #6366f1;
  --primary-hover: #777bff;
  --danger: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "Segoe UI", "PingFang SC", sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  display:flex; justify-content:center; align-items:center;
}
.login-box {
  background:var(--card-bg); border:1px solid var(--border); border-radius:16px;
  padding:40px; width:400px; max-width:90vw;
}
.logo { font-size:28px; font-weight:800; text-align:center; margin-bottom:8px; letter-spacing:-1px; }
.logo span { color:var(--primary); }
.sub { text-align:center; color:var(--text-dim); margin-bottom:32px; font-size:14px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; font-weight:500; }
.form-group input {
  width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px; outline:none; font-family:inherit;
}
.form-group input:focus { border-color:var(--primary); }
.btn {
  width:100%; padding:12px; border:none; border-radius:8px; cursor:pointer;
  font-size:15px; font-weight:600; transition:all .15s; margin-top:8px;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); margin-top:12px; }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.error { color:var(--danger); font-size:13px; text-align:center; margin-bottom:12px; min-height:20px; }
.footer { text-align:center; margin-top:20px; font-size:13px; color:var(--text-dim); }
.footer a { color:var(--primary); text-decoration:none; }
.footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">Task<span>Hub</span></div>
  <div class="sub">项目管理与任务协作平台</div>
  <div class="error" id="error"></div>
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>用户名 / 邮箱</label>
      <input type="text" id="username" placeholder="请输入用户名或邮箱" required autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">登 录</button>
  </form>
  <button class="btn btn-outline" onclick="location.href='/register'">还没有账号？立即注册</button>
  <!-- 默认账号已移除 -->
</div>

<script>
'use strict';
async function handleLogin(e) {
  e.preventDefault();
  var err = document.getElementById('error');
  var btn = document.getElementById('submitBtn');
  err.textContent = '';
  btn.textContent = '登录中...';
  btn.disabled = true;

  try {
    var res = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (res.ok && data.ok) {
      if (data.csrf_token) sessionStorage.setItem('csrf_token', data.csrf_token);
      window.location.href = '/';
    } else {
      err.textContent = data.error || '登录失败';
    }
  } catch(e) {
    err.textContent = '网络错误，请检查服务是否启动';
  }
  btn.textContent = '登 录';
  btn.disabled = false;
}
</script>
</body>
</html>
